<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>ERFAN MD| Mini BOT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0a0e1a;
      color: white;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    .bg-gradient {
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, rgba(212, 175, 55, 0.12) 0%, transparent 60%),
                  radial-gradient(circle at 70% 70%, rgba(240, 165, 0, 0.10) 0%, transparent 60%),
                  linear-gradient(180deg, #0a0e1a 0%, #0f1628 50%, #0a0e1a 100%);
      z-index: 0;
    }

    .glow-orb {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.25;
      z-index: 1;
      animation: float 20s infinite ease-in-out;
    }

    .orb-1 {
      top: -200px;
      left: -200px;
      background: linear-gradient(135deg, #d4af37 0%, #f0a500 100%);
      animation-delay: 0s;
    }

    .orb-2 {
      bottom: -200px;
      right: -200px;
      background: linear-gradient(135deg, #ffc107 0%, #ff8c00 100%);
      animation-delay: -10s;
    }

    @keyframes float {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      33% {
        transform: translate(50px, -50px) scale(1.1);
      }
      66% {
        transform: translate(-50px, 50px) scale(0.9);
      }
    }

    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: linear-gradient(145deg, rgba(15, 22, 40, 0.9) 0%, rgba(10, 14, 26, 0.95) 100%);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 30px;
      padding: 50px 40px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6),
                  0 0 60px rgba(212, 175, 55, 0.08),
                  inset 0 1px 0 rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
      animation: slideIn 0.6s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #d4af37, #ffc107, #d4af37, transparent);
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-container {
      width: 100px;
      height: 100px;
      margin: 0 auto 25px;
      position: relative;
    }

    .logo-ring {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 3px solid transparent;
      border-top-color: #d4af37;
      border-right-color: #ffc107;
      border-radius: 50%;
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .logo {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #d4af37 0%, #f0a500 50%, #ffc107 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      color: #0a0e1a;
      box-shadow: 0 10px 40px rgba(212, 175, 55, 0.4),
                  0 0 30px rgba(212, 175, 55, 0.2);
    }

    .title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #d4af37 0%, #ffc107 50%, #f0a500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
    }

    .subtitle {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 400;
    }

    .info-box {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(240, 165, 0, 0.05) 100%);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 30px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .info-box i {
      color: #d4af37;
      font-size: 20px;
      margin-top: 2px;
    }

    .info-box-text {
      flex: 1;
    }

    .info-box-text strong {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
      color: #ffc107;
    }

    .info-box-text p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 25px;
    }

    .label {
      display: block;
      margin-bottom: 10px;
      font-weight: 500;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.9);
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 18px;
      transition: all 0.3s ease;
    }

    .input {
      width: 100%;
      padding: 18px 20px 18px 55px;
      background: rgba(255, 255, 255, 0.03);
      border: 2px solid rgba(212, 175, 55, 0.2);
      border-radius: 16px;
      color: white;
      font-size: 16px;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .input:focus {
      outline: none;
      border-color: #d4af37;
      background: rgba(212, 175, 55, 0.05);
      box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1),
                  0 0 20px rgba(212, 175, 55, 0.1);
    }

    .input:focus + .input-icon {
      color: #d4af37;
    }

    .input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .hint {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hint i {
      font-size: 12px;
      color: #d4af37;
    }

    .btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-generate {
      background: linear-gradient(135deg, #d4af37 0%, #f0a500 50%, #ffc107 100%);
      color: #0a0e1a;
      box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3),
                  0 0 20px rgba(212, 175, 55, 0.2);
      margin-bottom: 20px;
    }

    .btn-generate:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(212, 175, 55, 0.5),
                  0 0 40px rgba(212, 175, 55, 0.3);
    }

    .btn-generate:active:not(:disabled) {
      transform: translateY(-1px);
    }

    .btn-generate:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-copy {
      background: rgba(212, 175, 55, 0.1);
      color: #ffc107;
      border: 1px solid rgba(212, 175, 55, 0.3);
      display: none;
    }

    .btn-copy:hover {
      background: rgba(212, 175, 55, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(212, 175, 55, 0.2);
    }

    .loading {
      display: none;
      text-align: center;
      margin: 25px 0;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(212, 175, 55, 0.2);
      border-radius: 50%;
      border-top-color: #d4af37;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    .loading-text {
      color: rgba(255, 255, 255, 0.7);
      font-size: 15px;
    }

    .code-box {
      background: rgba(0, 0, 0, 0.3);
      border: 2px solid rgba(212, 175, 55, 0.15);
      border-radius: 16px;
      padding: 25px;
      text-align: center;
      margin-bottom: 15px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .code-box.has-code {
      border-color: rgba(16, 185, 129, 0.5);
      background: rgba(16, 185, 129, 0.08);
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.1);
    }

    .code-box.has-error {
      border-color: rgba(248, 113, 113, 0.5);
      background: rgba(248, 113, 113, 0.08);
    }

    .code-placeholder {
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
    }

    .code-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #10b981;
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      gap: 12px;
      text-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
    }

    .code-value i {
      font-size: 24px;
    }

    .error-value {
      color: #f87171;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      padding-top: 25px;
      border-top: 1px solid rgba(212, 175, 55, 0.15);
    }

    .footer-text {
      font-size: 13px;
      color: rgba(212, 175, 55, 0.6);
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(150px);
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      padding: 16px 28px;
      border-radius: 50px;
      font-weight: 500;
      box-shadow: 0 10px 40px rgba(16, 185, 129, 0.4);
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 1000;
      opacity: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.error {
      background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
    }

    @media (max-width: 580px) {
      .card {
        padding: 40px 25px;
        border-radius: 25px;
      }

      .title {
        fontSize: 28px;
      }

      .logo-container {
        width: 85px;
        height: 85px;
      }

      .logo {
        font-size: 36px;
      }

      .code-value {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>

  <div class="container">
    <div class="card">
      <div class="header">
        <div class="logo-container">
          <div class="logo-ring"></div>
          <div class="logo">
            <i class="fas fa-bolt"></i>
          </div>
        </div>
        <h1 class="title">ERFAN-MD</h1>
        <p class="subtitle">Generate Your Pairing Code</p>
      </div>

      <div class="info-box">
        <i class="fas fa-info-circle"></i>
        <div class="info-box-text">
          <strong>Quick Setup</strong>
          <p>Enter your WhatsApp number to instantly generate a pairing code. No deployment needed!</p>
        </div>
      </div>

      <form id="pairForm">
        <div class="form-group">
          <label class="label">WhatsApp Number</label>
          <div class="input-wrapper">
            <input 
              type="tel" 
              id="phoneNumber" 
              class="input" 
              placeholder="9233061xxxxx"
              pattern="[0-9]+"
              required
            >
            <i class="fas fa-phone input-icon"></i>
          </div>
          <div class="hint">
            <i class="fas fa-lightbulb"></i>
            Include country code (e.g., 92 for Pakistan)
          </div>
        </div>

        <button type="submit" class="btn btn-generate" id="generateBtn">
          <i class="fas fa-key"></i>
          Generate Pair Code
        </button>

        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p class="loading-text">Generating your pair code...</p>
        </div>

        <div class="code-box" id="codeBox">
          <div class="code-placeholder">Your pairing code will appear here</div>
        </div>

        <button type="button" class="btn btn-copy" id="copyBtn">
          <i class="fas fa-copy"></i>
          Copy Code
        </button>
      </form>

      <div class="footer">
        <p class="footer-text">
          © 2026 ERFAN-MD
        </p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span>Code copied successfully!</span>
  </div>

  <script>
    const phoneInput = document.getElementById('phoneNumber');
    const generateBtn = document.getElementById('generateBtn');
    const loading = document.getElementById('loading');
    const codeBox = document.getElementById('codeBox');
    const copyBtn = document.getElementById('copyBtn');
    const toast = document.getElementById('toast');
    const form = document.getElementById('pairForm');

    let currentCode = null;

    function showToast(message, isError = false) {
      const toastIcon = toast.querySelector('i');
      const toastText = toast.querySelector('span');
      
      toastIcon.className = isError ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
      toastText.textContent = message;
      toast.className = `toast ${isError ? 'error' : ''} show`;
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    function validatePhone(number) {
      const cleaned = number.replace(/[^\d]/g, '');
      return cleaned.length >= 10 && cleaned.length <= 15;
    }

    function showError(message) {
      codeBox.className = 'code-box has-error';
      codeBox.innerHTML = `
        <div class="error-value">
          <i class="fas fa-exclamation-circle"></i>
          <span>${message}</span>
        </div>
      `;
      copyBtn.style.display = 'none';
    }

    function showCode(code) {
      currentCode = code;
      codeBox.className = 'code-box has-code';
      codeBox.innerHTML = `
        <div class="code-value">
          <i class="fas fa-check-circle"></i>
          <span>${code}</span>
        </div>
      `;
      copyBtn.style.display = 'flex';
    }

    function resetCodeBox() {
      codeBox.className = 'code-box';
      codeBox.innerHTML = '<div class="code-placeholder">Your pairing code will appear here</div>';
      copyBtn.style.display = 'none';
      currentCode = null;
    }

    async function generatePairCode(e) {
      e.preventDefault();
      
      const phoneNumber = phoneInput.value.trim();
      
      if (!phoneNumber) {
        showError('Please enter your WhatsApp number');
        showToast('Phone number is required', true);
        return;
      }
      
      if (!validatePhone(phoneNumber)) {
        showError('Please enter a valid phone number');
        showToast('Invalid phone number format', true);
        return;
      }
      
      generateBtn.style.display = 'none';
      loading.style.display = 'block';
      resetCodeBox();
      
      try {
        const response = await fetch(`/code?number=${phoneNumber.replace(/[^\d]/g, '')}`);
        
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        
        const data = await response.json();
        
        if (data.code && data.code !== 'Service Unavailable') {
          showCode(data.code);
          showToast('Pair code generated successfully!');
        } else {
          throw new Error('Service temporarily unavailable');
        }
        
      } catch (error) {
        console.error('Error:', error);
        showError('Failed to generate code. Please try again.');
        showToast('Error generating code', true);
      } finally {
        generateBtn.style.display = 'flex';
        loading.style.display = 'none';
      }
    }

    async function copyCode() {
      if (!currentCode) return;
      
      try {
        await navigator.clipboard.writeText(currentCode);
        
        const originalHTML = copyBtn.innerHTML;
        copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        copyBtn.disabled = true;
        copyBtn.style.opacity = '0.7';
        
        showToast('Code copied to clipboard!');
        
        setTimeout(() => {
          copyBtn.innerHTML = originalHTML;
          copyBtn.disabled = false;
          copyBtn.style.opacity = '1';
        }, 2000);
        
      } catch (error) {
        console.error('Copy failed:', error);
        showToast('Failed to copy code', true);
      }
    }

    form.addEventListener('submit', generatePairCode);
    copyBtn.addEventListener('click', copyCode);

    phoneInput.addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/[^\d]/g, '');
    });

    phoneInput.addEventListener('focus', () => {
      if (codeBox.classList.contains('has-error')) {
        resetCodeBox();
      }
    });
  </script>
</body>
</html>
